name: Bug report
description: Something in the tool itself is broken
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Plain English description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact commands and the output you got
      placeholder: |
        1. python registry.py --recommend
        2. ...
        Output:
        ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `python registry.py --version`
      placeholder: registry.py 4.0.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS + Python version
      placeholder: macOS 14.4, Python 3.12.1
    validations:
      required: true
