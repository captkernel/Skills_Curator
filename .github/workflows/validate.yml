name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    env:
      SKILLS_NO_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Syntax check
        run: python -c "import ast; ast.parse(open('skills/skills-curator/scripts/registry.py', encoding='utf-8').read())"

      - name: Help and version
        run: |
          python skills/skills-curator/scripts/registry.py --version
          python skills/skills-curator/scripts/registry.py --help

      - name: Unit tests
        run: python -m pytest tests/ -v
